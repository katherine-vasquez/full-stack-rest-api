openapi: 3.0.0

info:
  title: Blog API
  version: 1.0.0
  description: API REST con Express y PostgreSQL

servers:
  - url: https://proyectom2katherinevasquez-production.up.railway.app

paths:

  /authors:
    get:
      summary: Obtener todos los autores
      responses:
        "200":
          description: Lista de autores

    post:
      summary: Crear un autor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                bio:
                  type: string
      responses:
        "201":
          description: Autor creado

  /authors/{id}:
    get:
      summary: Obtener autor por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Autor encontrado
        "404":
          description: Autor no encontrado

    put:
      summary: Actualizar autor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                bio:
                  type: string
      responses:
        "200":
          description: Autor actualizado
        "404":
          description: Autor no encontrado

    delete:
      summary: Eliminar autor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Autor eliminado
        "404":
          description: Autor no encontrado

  /posts:
    get:
      summary: Obtener todos los posts
      responses:
        "200":
          description: Lista de posts

    post:
      summary: Crear un post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                author_id:
                  type: integer
                published:
                  type: boolean
      responses:
        "201":
          description: Post creado

  /posts/{id}:
    get:
      summary: Obtener post por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post encontrado
        "404":
          description: Post no encontrado

    put:
      summary: Actualizar post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                author_id:
                  type: integer
                published:
                  type: boolean
      responses:
        "200":
          description: Post actualizado
        "404":
          description: Post no encontrado

    delete:
      summary: Eliminar post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Post eliminado
        "404":
          description: Post no encontrado

  /posts/author/{authorId}:
    get:
      summary: Obtener posts por autor
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de posts del autor
        "404":
          description: Autor no encontrado

  /comments:
    get:
      summary: Obtener todos los comentarios
      responses:
        "200":
          description: Lista de comentarios

    post:
      summary: Crear un comentario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                post_id:
                  type: integer
                author_id:
                  type: integer
                content:
                  type: string
      responses:
        "201":
          description: Comentario creado

  /comments/post/{postId}:
    get:
      summary: Obtener comentarios por post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de comentarios del post