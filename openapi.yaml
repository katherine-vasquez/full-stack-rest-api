openapi: 3.0.0

info:
  title: Full Stack REST API
  version: 1.0.0
  description: REST API built with Node.js, Express and PostgreSQL featuring CRUD operations, relational database design, OpenAPI documentation, automated testing and cloud deployment.

servers:
  - url: https://proyectom2katherinevasquez-production.up.railway.app

paths:

  # =========================
  # AUTHORS
  # =========================
  /authors:
    get:
      summary: Obtener todos los autores
      responses:
        "200":
          description: Lista de autores
          content:
            application/json:
              example:
                - id: 1
                  name: Ana García
                  email: ana@email.com
                  bio: Escritora técnica
                  created_at: "2026-05-18T20:50:08.697Z"

    post:
      summary: Crear un autor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                bio:
                  type: string
              required:
                - name
                - email
      responses:
        "201":
          description: Autor creado

  /authors/{id}:
    get:
      summary: Obtener autor por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Autor encontrado
        "404":
          description: Autor no encontrado

    put:
      summary: Actualizar autor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                bio:
                  type: string
      responses:
        "200":
          description: Autor actualizado
        "404":
          description: Autor no encontrado

    delete:
      summary: Eliminar autor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Autor eliminado

  # =========================
  # POSTS
  # =========================
  /posts:
    get:
      summary: Obtener todos los posts
      responses:
        "200":
          description: Lista de posts
          content:
            application/json:
              example:
                - id: 1
                  title: Introducción a Node.js
                  content: Contenido del post
                  published: true
                  created_at: "2026-05-18T20:50:08.697Z"
                  author_name: Ana García

    post:
      summary: Crear un post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                author_id:
                  type: integer
                published:
                  type: boolean
              required:
                - title
                - content
                - author_id
      responses:
        "201":
          description: Post creado

  /posts/{id}:
    get:
      summary: Obtener post por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post encontrado
        "404":
          description: Post no encontrado

    put:
      summary: Actualizar post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                author_id:
                  type: integer
                published:
                  type: boolean
      responses:
        "200":
          description: Post actualizado
        "404":
          description: Post no encontrado

    delete:
      summary: Eliminar post
      responses:
        "204":
          description: Post eliminado

  /posts/author/{authorId}:
    get:
      summary: Obtener posts por autor
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de posts del autor

  # =========================
  # COMMENTS
  # =========================
  /comments:
    get:
      summary: Obtener todos los comentarios
      responses:
        "200":
          description: Lista de comentarios
          content:
            application/json:
              example:
                - id: 1
                  content: Excelente artículo sobre Node.js
                  created_at: "2026-05-18T20:50:08.697Z"
                  author_name: Ana García
                  post_title: Introducción a Node.js

    post:
      summary: Crear comentario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                post_id:
                  type: integer
                author_id:
                  type: integer
                content:
                  type: string
              required:
                - post_id
                - author_id
                - content
      responses:
        "201":
          description: Comentario creado

  /comments/post/{postId}:
    get:
      summary: Obtener comentarios por post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de comentarios del post
